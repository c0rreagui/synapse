<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
        @layer utilities {
            .perspective-1000 {
                perspective: 1000px;
            }
            .transform-style-3d {
                transform-style: preserve-3d;
            }
            .orbit-container {
                animation: rotate-orbit 60s linear infinite;
            }
            @keyframes rotate-orbit {
                from { transform: rotateY(0deg) rotateX(20deg); }
                to { transform: rotateY(360deg) rotateX(20deg); }
            }
            .orbit-item {
                animation: counter-rotate 60s linear infinite;
            }
            @keyframes counter-rotate {
                from { transform: rotateX(-20deg) rotateY(360deg); }
                to { transform: rotateX(-20deg) rotateY(0deg); }
            }
            .matrix-rain {
                background: linear-gradient(180deg, 
                    rgba(7, 182, 213, 0) 0%, 
                    rgba(7, 182, 213, 0.4) 50%, 
                    rgba(99, 102, 241, 0) 100%);
                background-size: 1px 150px;
                animation: rain 3s linear infinite;
            }
            @keyframes rain {
                0% { background-position: 0 -150px; }
                100% { background-position: 0 100%; }
            }
            .singularity-core {
                background: radial-gradient(circle at center, #000000 0%, #0c0e14 100%);
                box-shadow: inset 0 0 40px rgba(7, 182, 213, 0.3);
            }
            .volumetric-glow {
                 box-shadow: 
                    0 0 60px rgba(7, 182, 213, 0.2),
                    0 0 120px rgba(99, 102, 241, 0.15),
                    inset 0 0 30px rgba(255, 255, 255, 0.1);
            }
            .internal-energy {
                background-image: radial-gradient(circle, rgba(7,182,213,0.8) 1px, transparent 1px);
                background-size: 10px 10px;
                animation: energy-pulse 4s ease-in-out infinite alternate;
                mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
            }
            @keyframes energy-pulse {
                0% { opacity: 0.3; transform: scale(0.95); }
                100% { opacity: 0.6; transform: scale(1.05); }
            }
            .star-field {
                background-image: 
                    radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                    radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
                    radial-gradient(1.5px 1.5px at 50px 160px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
                    radial-gradient(2px 2px at 90px 40px, rgba(165, 180, 252, 0.5), rgba(0,0,0,0));
                background-repeat: repeat;
                background-size: 300px 300px;
            }
            .nebula-cloud {
                background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.08), transparent 70%);
                filter: blur(40px);
            }
            .glass-tag {
                background: rgba(12, 14, 20, 0.4);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 
                    0 4px 6px -1px rgba(0, 0, 0, 0.1), 
                    0 2px 4px -1px rgba(0, 0, 0, 0.06),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
            }
            .hud-line {
                background: linear-gradient(90deg, transparent, rgba(7, 182, 213, 0.3), transparent);
                height: 1px;
            }
            .aberration {
                text-shadow: 
                    1px 0 rgba(255,0,0,0.3), 
                    -1px 0 rgba(0,255,255,0.3);
            }
            .soft-pulse {
                animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            @keyframes pulse-soft {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
            .scan-line {
                background: linear-gradient(to bottom, transparent, rgba(7, 182, 213, 0.05), transparent);
                animation: scan 8s linear infinite;
            }
            @keyframes scan {
                0% { transform: translateY(-100%); }
                100% { transform: translateY(100vh); }
            }
        }
    </style>
